profile: standard
description: "ETH/UofC standard analysis: seg_gauss segmentation with grayscale-and-binary remodelling."

multistack_correction:
  enabled: true

masks:
  segmentation:
    method: seg_gauss

analysis:
  space: pairwise_fixed_t0
  method: auto
  change_detection: grayscale_delta
  change_region:
    source: common_mask
    dilation_voxels: 0
    erosion_voxels: 0
  binary_reclassification:
    enabled: true
  pair_mode: adjacent
  thresholds: [225]
  cluster_sizes: [12]
  gaussian_filter: true
  gaussian_sigma: 1.2

visualization:
  enabled: true
  threshold: 225
  cluster_size: 12
