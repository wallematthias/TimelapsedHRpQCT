profile: xct1-standard
description: XCT1 standard analysis profile using Laplace-Hamming segmentation and grayscale-only remodelling.

multistack_correction:
  enabled: false

masks:
  segmentation:
    method: laplace_hamming

analysis:
  space: pairwise_fixed_t0
  change_detection: grayscale_delta
  change_region:
    source: common_mask
    dilation_voxels: 0
    erosion_voxels: 0
  binary_reclassification:
    enabled: false
  pair_mode: adjacent
  thresholds: [225]
  cluster_sizes: [5]
  gaussian_filter: true
  gaussian_sigma: 0.8
  image_interpolator: bspline

visualization:
  enabled: true
  threshold: 225
  cluster_size: 5
