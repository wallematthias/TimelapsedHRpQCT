profile: ped-fx
description: Pediatric fracture profile with multistack correction, geodesic periosteal contouring, Gaussian segmentation, and full-mask-only analysis.

multistack_correction:
  enabled: true
  method: superstack
  transform_type: euler
  metric: correlation
  sampling_percentage: 0.05
  interpolator: linear
  optimizer: adaptive_stochastic_gradient_descent
  number_of_iterations: 250
  automatic_parameter_estimation: true
  initializer: identity
  initial_translation_voxels: [0, 0, -3]
  overlap_crop_buffer_voxels: 20
  number_of_resolutions: 4
  use_masks: true
  translation_first: true
  debug: false

masks:
  roles: [full]
  outer:
    contour_method: geodesic_fracture
    geodesic_bone_threshold: 250
    geodesic_fill_holes: true
  inner:
    contour_method: none
  segmentation:
    method: seg_gauss

analysis:
  compartments: [full]
  space: pairwise_fixed_t0
  change_detection: grayscale_delta
  change_region:
    source: common_mask
    dilation_voxels: 0
    erosion_voxels: 0
  binary_reclassification:
    enabled: true
  pair_mode: adjacent
  thresholds: [225]
  cluster_sizes: [12]
  gaussian_filter: true
  gaussian_sigma: 1.2
  image_interpolator: bspline

visualization:
  enabled: true
  threshold: 225
  cluster_size: 12
