profile: shriners
description: Shriners analysis profile using seg_gauss segmentation and grayscale-delta-only remodelling.

multistack_correction:
  enabled: true

masks:
  segmentation:
    method: seg_gauss

analysis:
  space: pairwise_fixed_t0
  method: grayscale_delta_only
  pair_mode: adjacent
  thresholds: [225]
  cluster_sizes: [0]
  gaussian_filter: true
  gaussian_sigma: 1.2

visualization:
  enabled: true
  threshold: 225
  cluster_size: 0
