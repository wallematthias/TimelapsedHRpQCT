profile: ucsf
description: UCSF analysis profile using Laplace-Hamming segmentation and marrow-mask grayscale remodelling.

multistack_correction:
  enabled: true

masks:
  segmentation:
    method: laplace_hamming

analysis:
  space: pairwise_fixed_t0
  change_detection: grayscale_delta
  change_region:
    source: common_mask
    dilation_voxels: 0
    erosion_voxels: 0
  binary_reclassification:
    enabled: false
  fraction_denominator: bone_union
  pair_mode: adjacent
  thresholds: [475]
  cluster_sizes: [5]
  gaussian_filter: false

visualization:
  enabled: true
  threshold: 475
  cluster_size: 5
