# TimelapsedHRpQCT default configuration.
#
# This file is the base layer for every run. Profiles and user configs are
# merged on top of it:
#
#   defaults.yml < --profile < --config
#
# In normal use, keep this file unchanged and put study-specific overrides in a
# small user config generated with:
#
#   timelapse config write --profile multistack --output study.yml

# -----------------------------------------------------------------------------
# Import
# -----------------------------------------------------------------------------
import:
  # Number of axial slices in one scanner stack; typical XtremeCT II value is 168.
  # Reasonable range: 80-336, depending on acquisition protocol.
  stack_depth: 168

  # What to do when the axial size is not an exact multiple of stack_depth.
  # Options: keep_last | drop_last | error.
  on_incomplete_stack: keep_last

  # Crop imported images to a subject-wise bounding box before stack splitting.
  # Options: true | false.
  crop_to_subject_box: false

  # BMD threshold used to detect the subject support for optional cropping.
  # Reasonable range: 100-800 mgHA/cm3; higher is stricter.
  crop_threshold_bmd: 450.0

  # Padding around the detected crop box in voxels.
  # Reasonable range: 0-50.
  crop_padding_voxels: 5

  # Number of largest connected subject components kept during crop detection.
  # Reasonable range: 1-5; use 1 for a single limb/ROI.
  crop_num_largest_components: 1

# -----------------------------------------------------------------------------
# Discovery
# -----------------------------------------------------------------------------
discovery:
  # Filename parser for raw AIM files. Named groups used by the pipeline:
  # subject, site, stack, session, role. Leave unchanged unless your filenames
  # differ systematically.
  session_regex: '(?i)^(?P<subject>.+?)(?:_(?P<site>DR|DT|KN|RL|RR|TL|TR|KL|KR|RADIUS|TIBIA|KNEE|RADIUS_LEFT|RADIUS_RIGHT|TIBIA_LEFT|TIBIA_RIGHT|KNEE_LEFT|KNEE_RIGHT))?(?:_STACK(?P<stack>\d+))?_(?P<session>[A-Z][A-Z0-9]*)(?:_(?P<role>.*))?\.aim(?:;\d+)?$'

  # Site assigned when no site can be parsed from filename/path/header.
  # Options: radius | tibia | knee | radius_left | radius_right | tibia_left | tibia_right | knee_left | knee_right.
  default_site: tibia

  # Site aliases accepted during discovery. Edit only when your scanner/export
  # naming uses different site tokens.
  site_aliases:
    # Tokens mapped to the canonical radius site.
    radius: [DR, RADIUS, RAD]
    # Tokens mapped to the canonical tibia site.
    tibia: [DT, TIBIA, TIB]
    # Tokens mapped to the canonical knee site.
    knee: [KN, KNEE]
    # Tokens mapped to the canonical left radius site.
    radius_left: [RL, RADIUS_LEFT, RADL, LEFT_RADIUS]
    # Tokens mapped to the canonical right radius site.
    radius_right: [RR, RADIUS_RIGHT, RADR, RIGHT_RADIUS]
    # Tokens mapped to the canonical left tibia site.
    tibia_left: [TL, TIBIA_LEFT, TIBL, LEFT_TIBIA]
    # Tokens mapped to the canonical right tibia site.
    tibia_right: [TR, TIBIA_RIGHT, TIBR, RIGHT_TIBIA]
    # Tokens mapped to the canonical left knee site.
    knee_left: [KL, KNL, KNEE_LEFT, KNEEL, LEFT_KNEE]
    # Tokens mapped to the canonical right knee site.
    knee_right: [KR, KNR, KNEE_RIGHT, KNEER, RIGHT_KNEE]

  # Session aliases normalized during discovery. Add study-specific names here
  # if needed, for example M00 -> T1 or M12 -> T2.
  session_aliases:
    # Baseline session aliases.
    T1: [BASELINE, BL]
    # First follow-up aliases.
    T2: [FOLLOWUP, FOLLOWUP1, FL, FU]

  # Role aliases used to identify masks/segmentations. ROI masks are also
  # auto-detected from suffixes like _ROI1, _ROI2, and do not need aliases here.
  role_aliases:
    # Cortical mask role.
    cort: ["CORT_MASK", "_CORT", "CORTICAL"]
    # Trabecular mask role.
    trab: ["TRAB_MASK", "_TRAB", "TRABECULAR"]
    # Whole-bone/full support mask role.
    full: ["FULL_MASK", "_FULL"]
    # Explicit registration mask role; preferred over trab+cort/full for registration.
    regmask: ["REGMASK", "_REGMASK", "_REG"]
    # Binary/label segmentation role.
    seg: ["_SEG", "SEG"]

# -----------------------------------------------------------------------------
# Mask Generation
# -----------------------------------------------------------------------------
masks:
  # Generate missing masks after import/generate-masks.
  # Options: true | false.
  generate: true

  # Replace existing generated masks/segmentations.
  # Options: true | false.
  overwrite: false

  # Canonical mask roles to create or require.
  # Options: any subset of [full, trab, cort].
  roles: [full, trab, cort]

  # Generate a segmentation volume from masks/image when possible.
  # Options: true | false.
  generate_segmentation: true

  # QC guardrail for inward endosteal-contour bulging and open/too-thin cortex.
  # Mask generation first evaluates the configured/default inner-contour result,
  # then tries at most max_attempts - 1 candidate inner settings and keeps the
  # first passing result, or the best-scoring attempted result if none pass.
  adaptive_inner_contour:
    # Options: true | false.
    enabled: true
    # Maximum total attempts including the initial configured/default attempt.
    # Recommended range: 1-4.
    max_attempts: 3
    # Number of radial angles sampled per axial slice for cortical thickness QC.
    # Recommended range: 48-192.
    n_angles: 96
    # Cortex-closure guardrails. A radial sector thinner than one voxel suggests
    # the trabecular/endosteal mask touches the outer contour locally.
    min_thickness_voxels: 1.0
    max_thin_fraction: 0.02
    # Bulge/regularity pass/fail limits. Null disables that specific limit.
    max_p95_thickness_mm: 2.5
    max_thickness_mm: 4.0
    max_median_cv: 0.35
    max_bulge_fraction: 0.12
    # Minimum relative QC-score improvement required before accepting a later
    # candidate as better than the current best.
    min_score_improvement: 0.05
    # Candidate inner-contour overrides tried in order after the initial result.
    candidates:
      - endosteal_kernelsize: 1
        peel: 1
        trabecular_close_radius: 12
      - endosteal_kernelsize: 1
        peel: 0
        trabecular_close_radius: 8

  # Site-specific contour defaults. Binarization follows masks.segmentation.method;
  # these site presets only control contour morphology, padding, peel, and margins.
  # Kernel/radius, padding, peel, and margin values are voxel counts.
  site_defaults:
    radius:
      inner:
        # Endosteal morphology kernel size; reasonable odd range: 1-15.
        endosteal_kernelsize: 3
        # Voxels peeled from cortex/marrow boundary; range: 0-8.
        peel: 3
        # Closing radius for trabecular/marrow cavity support; range: 5-50.
        trabecular_close_radius: 15
        # Initial padding around contour operations; range: 0-80 voxels.
        init_pad: 30
        # Downsample factor for morphology; range: 1-4.
        morphology_downsample_factor: 1
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-10.
        morphology_refine_band_voxels: 3
      outer:
        # Periosteal morphology kernel size; reasonable odd range: 1-25.
        periosteal_kernelsize: 5
        # Opening radius for small exterior connections; range: 0-15.
        periosteal_open_radius: 2
        # Depth interval used for expansion/refinement; two voxel counts, range: 0-20.
        expansion_depth: [0, 5]
        # Initial padding around contour operations; range: 0-80 voxels.
        init_pad: 15
        # Fill holes in the periosteal mask.
        # Options: true | false.
        fill_holes: true
        # Downsample factor for morphology; range: 1-4.
        morphology_downsample_factor: 1
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-10.
        morphology_refine_band_voxels: 3

    tibia:
      inner:
        # Endosteal morphology kernel size; reasonable odd range: 1-15.
        endosteal_kernelsize: 3
        # Voxels peeled from cortex/marrow boundary; range: 0-8.
        peel: 3
        # Closing radius for trabecular/marrow cavity support; range: 5-60.
        trabecular_close_radius: 25
        # Initial padding around contour operations; range: 0-80 voxels.
        init_pad: 30
        # Downsample factor for morphology; range: 1-4.
        morphology_downsample_factor: 1
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-10.
        morphology_refine_band_voxels: 3
      outer:
        # Periosteal morphology kernel size; reasonable odd range: 1-25.
        periosteal_kernelsize: 5
        # Opening radius for small exterior connections; range: 0-15.
        periosteal_open_radius: 2
        # Depth interval used for expansion/refinement; two voxel counts, range: 0-20.
        expansion_depth: [0, 5]
        # Initial padding around contour operations; range: 0-80 voxels.
        init_pad: 15
        # Fill holes in the periosteal mask.
        # Options: true | false.
        fill_holes: true
        # Downsample factor for morphology; range: 1-4.
        morphology_downsample_factor: 1
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-10.
        morphology_refine_band_voxels: 3

    knee:
      inner:
        # Knee endosteal morphology kernel size; reasonable odd range: 1-25.
        endosteal_kernelsize: 3
        # Voxels peeled from cortex/marrow boundary; range: 0-10.
        peel: 4
        # Closing radius for knee trabecular/marrow cavity support; range: 10-80.
        trabecular_close_radius: 36
        # Initial padding around contour operations; range: 0-120 voxels.
        init_pad: 30
        # Downsample factor for morphology; range: 1-5.
        morphology_downsample_factor: 3
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-15.
        morphology_refine_band_voxels: 3
      outer:
        # Knee periosteal morphology kernel size; reasonable odd range: 3-35.
        periosteal_kernelsize: 16
        # Opening radius for small exterior connections; range: 0-20.
        periosteal_open_radius: 8
        # Depth interval used for expansion/refinement; two voxel counts, range: 0-20.
        expansion_depth: [0, 5]
        # Initial padding around contour operations; range: 0-120 voxels.
        init_pad: 15
        # Fill holes in the periosteal mask.
        # Options: true | false.
        fill_holes: true
        # Downsample factor for morphology; range: 1-5.
        morphology_downsample_factor: 3
        # Refine contour edges after coarse morphology.
        # Options: true | false.
        morphology_refine_edges: false
        # Width of edge refinement band in voxels; range: 1-15.
        morphology_refine_band_voxels: 3

  outer:
    # Global periosteal contour override. Site defaults above keep this standard unless overridden.
    # Options: standard | geodesic_fracture.
    contour_method: standard
    # Bone threshold passed to the geodesic fracture contour method.
    geodesic_bone_threshold: 250
    # Fill internal holes in the geodesic fracture periosteal mask.
    # Options: true | false.
    geodesic_fill_holes: true

  inner:
    # Endosteal/trabecular-cortical contour method.
    # Options: standard | none.
    contour_method: standard

  segmentation:
    # Segmentation method for generating binary/label images from masks/image.
    # Options: adaptive | seg_gauss | laplace_hamming.
    method: adaptive
    # Gaussian smoothing sigma before seg_gauss thresholding; range: 0-3 voxels.
    gaussian_sigma: 0.8
    # Trabecular threshold for seg_gauss segmentation; range: 100-600 mgHA/cm3.
    trab_threshold: 320
    # Cortical threshold for seg_gauss segmentation; range: 200-900 mgHA/cm3.
    cort_threshold: 450
    # Lower adaptive threshold; range: 50-300 mgHA/cm3.
    adaptive_low_threshold: 100
    # Upper adaptive threshold; range: 150-700 mgHA/cm3.
    adaptive_high_threshold: 300
    # Adaptive local block size; must be odd. Reasonable range: 5-51.
    adaptive_block_size: 13
    # Remove connected components smaller than this voxel count; range: 0-10000.
    min_size_voxels: 64
    # Keep only the largest connected segmentation component.
    # Options: true | false.
    keep_largest_component: true
    # Laplace-Hamming low-pass cutoff for the frequency-domain Hamming filter; range: 0.1-1.0.
    laplace_hamming_low_pass_cutoff: 0.3
    # Laplace-Hamming high-pass cutoff; keep 0.0 for the reference low-pass workflow, range: 0.0-0.5.
    laplace_hamming_high_pass_cutoff: 0.0
    # Laplacian edge-enhancement weight from the reference workflow; range: 0.3-0.6.
    laplace_hamming_epsilon: 0.45
    # Hamming window amplitude; keep 1.0 for the reference workflow, range: 0.0-1.0.
    laplace_hamming_amplitude: 1.0
    # Overall frequency-domain amplification; keep 1.0 unless validating against a scanner-specific reference.
    # Reasonable range: 0.1-5.0.
    laplace_hamming_amplification: 1.0
    # Offset added before filtering. The updated Kazakia reference works on native Scanco int16, so this is 0.
    # Reasonable range: 0-32768.
    laplace_hamming_input_offset: 0.0
    # Deprecated legacy scale fields retained for config compatibility; the current reference path uses norm_max directly.
    laplace_hamming_ipl_scale_a: 77.7911
    laplace_hamming_ipl_scale_b: -1359190.17
    # Upper clipping value before int16-style scaling; reference value is 200000.
    # Reasonable range: 10000-500000.
    laplace_hamming_ipl_float_max: 200000.0
    # Final integer scaling maximum; reference value is 32767.
    # Reasonable range: 32767-65535.
    laplace_hamming_int16_max: 32767.0
    # Laplace-Hamming fixed threshold in filtered/scaled units; reference value corresponds to 475 per mille.
    # Reasonable range: 8000-25000.
    laplace_hamming_threshold: 15564
    # Remove LH components smaller than this voxel count; reasonable range: 0-10000.
    laplace_hamming_min_size_voxels: 70
    # Compute backend for LH FFT filtering.
    # Options: cpu | auto | torch_mps.
    # cpu is reproducible and dependency-free. auto tries Apple Metal/PyTorch MPS when available and falls back to CPU.
    laplace_hamming_backend: cpu

# -----------------------------------------------------------------------------
# Within-Stack Longitudinal Registration
# -----------------------------------------------------------------------------
timelapsed_registration:
  # Write registration QC/debug images and verbose backend logs.
  # Options: true | false.
  debug: false
  # Composition strategy for pairwise-to-baseline transforms.
  # Options: sequential_to_baseline.
  strategy: sequential_to_baseline
  # Baseline session selector.
  # Options: baseline | first.
  reference_session: baseline
  # Transform model estimated by elastix.
  # Options: euler | translation.
  transform_type: euler
  # Image similarity metric.
  # Options: mattes | correlation.
  metric: mattes
  # Fraction of voxels sampled for metric evaluation; range: 0.0001-0.05.
  sampling_percentage: 0.001
  # Registration interpolator.
  # Options: linear | nearest.
  interpolator: linear
  # Optimizer backend.
  # Options: adaptive_stochastic_gradient_descent | adaptive_stochastic.
  optimizer: adaptive_stochastic_gradient_descent
  # Maximum optimizer iterations per resolution; range: 50-2000.
  number_of_iterations: 250
  # Let elastix estimate ASGD parameters.
  # Options: true | false.
  automatic_parameter_estimation: true
  # ASGD SP_A when automatic_parameter_estimation is false; range: 1-1000.
  sp_a: 20.0
  # Maximum physical step length when automatic_parameter_estimation is false.
  # Use null to default to the minimum image spacing; otherwise range: 0.001-5.0 mm.
  maximum_step_length: null
  # ASGD sigmoid scale factor when automatic_parameter_estimation is false; range: 0.01-10.
  sigmoid_scale_factor: 0.1
  # Number of gradient measurements when automatic_parameter_estimation is false; range: 0-100.
  number_of_gradient_measurements: 0
  # Number of Jacobian measurements when automatic_parameter_estimation is false; range: 100-10000.
  number_of_jacobian_measurements: 1000
  # Initial transform method.
  # Options: geometry | moments | identity | none.
  initializer: geometry
  # Multi-resolution pyramid levels; range: 1-8.
  number_of_resolutions: 6
  # Use available registration masks.
  # Options: true | false.
  use_masks: true

# -----------------------------------------------------------------------------
# Multistack Correction
# -----------------------------------------------------------------------------
multistack_correction:
  # In run --mode auto, run multistack correction and filling when enabled.
  # The multistack profile enables this by default.
  # Options: true | false.
  enabled: false
  # Write multistack correction QC/debug outputs and verbose backend logs.
  # Options: true | false.
  debug: false
  # Correction algorithm.
  # Options: superstack | boundary_2d.
  method: superstack
  # Transform model estimated for adjacent stack correction.
  # Options: euler | translation.
  transform_type: euler
  # Image similarity metric.
  # Options: mattes | correlation.
  metric: mattes
  # Fraction of voxels sampled for metric evaluation; range: 0.0005-0.10.
  sampling_percentage: 0.005
  # Registration interpolator.
  # Options: linear | nearest.
  interpolator: linear
  # Optimizer backend.
  # Options: adaptive_stochastic_gradient_descent | adaptive_stochastic.
  optimizer: adaptive_stochastic_gradient_descent
  # Maximum optimizer iterations per resolution; range: 50-2000.
  number_of_iterations: 250
  # Let elastix estimate ASGD parameters.
  # Options: true | false.
  automatic_parameter_estimation: true
  # ASGD SP_A when automatic_parameter_estimation is false; range: 1-1000.
  sp_a: 20.0
  # Maximum physical step length when automatic_parameter_estimation is false.
  # Use null to default to the minimum image spacing; otherwise range: 0.001-5.0 mm.
  maximum_step_length: null
  # ASGD sigmoid scale factor when automatic_parameter_estimation is false; range: 0.01-10.
  sigmoid_scale_factor: 0.1
  # Number of gradient measurements when automatic_parameter_estimation is false; range: 0-100.
  number_of_gradient_measurements: 0
  # Number of Jacobian measurements when automatic_parameter_estimation is false; range: 100-10000.
  number_of_jacobian_measurements: 1000
  # Initial transform method.
  # Options: geometry | moments | identity | none.
  initializer: identity
  # Initial x/y/z translation in voxels for stack-to-stack correction; range: -100 to 100 each.
  initial_translation_voxels: [0, 0, -20]
  # Crop buffer around the mask overlap when preparing stack-correction inputs; range: 0-120 voxels.
  overlap_crop_buffer_voxels: 40
  # Multi-resolution pyramid levels; range: 1-8.
  number_of_resolutions: 4
  # Use available full masks for stack correction.
  # Options: true | false.
  use_masks: true
  # For Euler stack correction, run a translation pre-pass and use it to initialize Euler refinement.
  # Options: true | false.
  translation_first: false

# -----------------------------------------------------------------------------
# Transform Application
# -----------------------------------------------------------------------------
transform:
  # Interpolator for grayscale image resampling.
  # Options: linear | bspline | hamming_windowed_sinc | nearest.
  # Use bspline when matching manufacturer/legacy registered grayscale outputs
  # is more important than exact linear-resample reproducibility. Keep nearest
  # for debugging only; it creates blocky grayscale images.
  image_interpolator: linear
  # Interpolator for masks and segmentations.
  # Options: nearest | linear.
  # Keep nearest for binary masks/segmentations unless you explicitly want
  # partial-volume mask values before later thresholding.
  mask_interpolator: nearest

# -----------------------------------------------------------------------------
# Fusion and Filling
# -----------------------------------------------------------------------------
fusion:
  # Strategy for fusing overlapping multistack grayscale images.
  # Options: average | first | weighted_blend.
  strategy: average
  # Enable fill stage in multistack run mode.
  # Options: true | false.
  enable_filling: false

filling:
  # Smallest z-kernel size for spatial grayscale/segmentation filling; odd values preferred, range: 1-15.
  spatial_min_size: 3
  # Largest z-kernel size tried for spatial filling; odd values preferred, range: 3-51.
  spatial_max_size: 23
  # Increment between spatial kernel sizes; range: 1-10.
  spatial_step: 5
  # Neighboring timepoints considered during temporal filling; range: 1-10.
  temporal_n_images: 3
  # Multiplier controlling small-object removal during filling; range: 0-50.
  small_object_min_size_factor: 9
  # z-only closing kernel for allowed support; odd values preferred, range: 1-51.
  support_closing_z: 11
  # x/y ROI margin around fill candidates; range: 0-20 voxels.
  roi_margin_xy: 3
  # Additional z ROI margin around fill candidates; range: 0-20 voxels.
  roi_margin_z_extra: 2

# -----------------------------------------------------------------------------
# Analysis
# -----------------------------------------------------------------------------
analysis:
  # Coordinate space for pairwise remodelling analysis.
  # Options: pairwise_fixed_t0 | baseline_common.
  space: pairwise_fixed_t0
  # Legacy remodelling method selector.
  # Options: auto | grayscale_and_binary | grayscale_delta_only | grayscale_marrow_mask.
  # Use auto for new configs so change_region and binary_reclassification define behavior.
  method: auto
  # Grayscale change detector used for formation/resorption.
  # Options: grayscale_delta.
  change_detection: grayscale_delta
  # Compartments evaluated when ROI/regmask masks are not available.
  # Options: any subset of [full, trab, cort, regmask] plus ROI roles discovered from files.
  compartments:
    - full
    - trab
    - cort
  # Absolute BMD delta thresholds for formation/resorption; range: 20-1000 mgHA/cm3.
  thresholds:
    - 225
  # Minimum connected cluster sizes retained in remodelling maps; range: 1-10000 voxels.
  cluster_sizes:
    - 12
  # Connected-component neighborhood for remodelling cluster filtering.
  # Options: 6 | 18 | 26. Use 6 to match IPL/Scanco topology 6 behavior.
  cluster_connectivity: 6
  # Session-pair schedule.
  # Options: adjacent | baseline | all_pairs.
  pair_mode: adjacent
  # Use filled images instead of fused transformed images for analysis.
  # Options: true | false.
  use_filled_images: false
  # Smooth grayscale images before delta calculation.
  # Options: true | false.
  gaussian_filter: true
  # Gaussian smoothing sigma in voxels; range: 0-5.
  gaussian_sigma: 1.2
  # Denominator used for formation/resorption fraction columns.
  # Options: baseline_bone | bone_union | mean_bone | valid_region.
  # baseline_bone preserves historical fraction-of-BV0 behavior; bone_union uses
  # the union of baseline/follow-up bone when events are detected in the full common mask.
  fraction_denominator: baseline_bone
  # Interpolator for grayscale image resampling during pairwise_fixed_t0 analysis.
  # Options: linear | bspline | hamming_windowed_sinc | nearest | ipl_cubic.
  # This is separate from transform.image_interpolator because analysis can
  # resample directly into each t0 pair space without rerunning transform outputs.
  # bspline is the standard balance of smooth grayscale resampling and speed.
  # ipl_cubic matches Scanco IPL-style native-short cubic resampling and excludes
  # voxels without a complete cubic stencil from pairwise common regions.
  image_interpolator: bspline
  # Prefer a unique external direct pairwise transform for each t0/t1 analysis pair.
  # Options: true | false.
  # true uses DAT-derived T3->T1 directly when available instead of chaining
  # T3->T2->T1 through the baseline-composition graph. If no direct external
  # transform exists, the pipeline falls back to the existing composition logic.
  prefer_direct_pairwise_transforms: true
  # Dilation applied to full mask before common-region construction; range: 0-10 voxels.
  full_mask_dilation_voxels: 2
  change_region:
    # Region where grayscale formation/resorption can be detected.
    # Options: common_mask | bone_union.
    source: common_mask
    # Dilation applied to the change region; range: 0-10 voxels.
    dilation_voxels: 0
    # Erosion applied to the change region after dilation; range: 0-10 voxels.
    erosion_voxels: 0

  binary_reclassification:
    # Require binary segmentation state change in addition to grayscale threshold.
    # Options: true | false.
    enabled: true

  ring_artifact_suppression:
    # Remove locally paired positive/negative event dipoles before cluster filtering.
    # The polar mode uses AIM scanner/FOV center metadata when available to find
    # sign-specific circular event bands; component mode is a local opposite-sign
    # fallback. Validate on repeat scans because true cortical remodeling can
    # also occur near circular anatomy.
    # Options: true | false.
    enabled: false
    # Ring artifact suppression strategy.
    # Options: component | polar.
    mode: polar
    # In-plane search radius for opposite-sign event pairing; range: 0-5 voxels.
    proximity_voxels: 1
    # Axial search radius for opposite-sign pairing; range: 0-2 voxels.
    axial_radius_voxels: 0
    # Width of polar radius bins for scanner-centered ring detection; range: 0.5-5 voxels.
    radial_bin_width_voxels: 1.0
    # Minimum event voxels in a radius bin before it can be selected as a ring peak.
    # Reasonable range: 10-1000; larger values are more conservative.
    min_radius_band_events: 100
    # Extra neighboring radius bins removed around each selected detector ring; range: 0-5 bins.
    radial_band_padding_voxels: 2
    # Maximum number of detector ring peaks removed per comparison; range: 1-4.
    # Two is the physical default for pairwise timelapse: one ring family per scan.
    max_radius_bands: 2
    # Minimum separation between selected detector ring peaks; range: 1-50 voxels.
    min_radius_band_separation_voxels: 8

  valid_region:
    # Erosion applied to valid common region before analysis; range: 0-10 voxels.
    erosion_voxels: 1

# -----------------------------------------------------------------------------
# Visualization
# -----------------------------------------------------------------------------
visualization:
  # Write remodelling label volumes for one threshold/cluster combination.
  # Options: true | false.
  enabled: true
  # Threshold selected for visualization; use null to disable profile-selected visualization.
  # Reasonable range: one of analysis.thresholds.
  threshold: 225
  # Cluster size selected for visualization; use null to disable profile-selected visualization.
  # Reasonable range: one of analysis.cluster_sizes.
  cluster_size: 12

  label_map:
    # Integer label for resorption voxels; range: 0-255.
    resorption: 1
    # Integer label for demineralisation voxels; range: 0-255.
    demineralisation: 2
    # Integer label for unchanged/quiescent voxels; range: 0-255.
    quiescent: 2
    # Integer label for formation voxels; range: 0-255.
    formation: 3
    # Integer label for mineralisation voxels; range: 0-255.
    mineralisation: 2
