# -----------------------------------------------------------------------------
# TimelapsedHRpQCT default configuration
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Import
# -----------------------------------------------------------------------------
import:
  stack_depth: 168
  on_incomplete_stack: error # error | drop_last | keep_last

  crop_to_subject_box: false
  crop_threshold_bmd: 450.0
  crop_padding_voxels: 5
  crop_num_largest_components: 1

# -----------------------------------------------------------------------------
# Discovery
# -----------------------------------------------------------------------------
discovery:
  session_regex: '(?i)^(?P<subject>.+?)(?:_(?P<site>DR|DT|KN|RADIUS|TIBIA|KNEE))?(?:_STACK(?P<stack>\d+))?_(?P<session>[A-Z][A-Z0-9]*)(?:_(?P<role>.*))?\.aim(?:;\d+)?$'

  default_site: tibia
  site_aliases:
    radius: [DR, RADIUS, RAD]
    tibia: [DT, TIBIA, TIB]
    knee: [KN, KNEE]
  session_aliases:
    T1: [BASELINE, BL]
    T2: [FOLLOWUP, FOLLOWUP1, FL, FU]

  role_aliases:
    cort: ["CORT_MASK", "_CORT", "CORTICAL"]
    trab: ["TRAB_MASK", "_TRAB", "TRABECULAR"]
    full: ["FULL_MASK", "_FULL"]
    regmask: ["REGMASK", "_REGMASK", "_REG"]
    seg: ["_SEG", "SEG"]

# -----------------------------------------------------------------------------
# Mask generation on imported stacks
# -----------------------------------------------------------------------------
masks:
  generate: true
  overwrite: false
  # Typical values: [full, trab, cort] or [full]
  roles: [full, trab, cort]
  generate_segmentation: true
  site_selection:
    default_site: tibia
    patterns:
      radius: [radius, rad]
      tibia: [tibia, tib]
      knee: [knee]
  site_defaults:
    radius:
      inner:
        endosteal_threshold: 500
        endosteal_kernelsize: 3
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        peel: 3
        trabecular_close_radius: 15
        init_pad: 30
        use_adaptive_threshold: false
        morphology_downsample_factor: 1
        morphology_refine_edges: false
        morphology_refine_band_voxels: 3

      outer:
        periosteal_threshold: 300
        periosteal_kernelsize: 5
        periosteal_open_radius: 2
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        expansion_depth: [0, 5]
        init_pad: 15
        fill_holes: true
        use_adaptive_threshold: true
        morphology_downsample_factor: 1
        morphology_refine_edges: false
        morphology_refine_band_voxels: 3

    tibia:
      inner:
        endosteal_threshold: 500
        endosteal_kernelsize: 3
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        peel: 3
        trabecular_close_radius: 25
        init_pad: 30
        use_adaptive_threshold: false
        morphology_downsample_factor: 1
        morphology_refine_edges: false
        morphology_refine_band_voxels: 3

      outer:
        periosteal_threshold: 300
        periosteal_kernelsize: 5
        periosteal_open_radius: 2
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        expansion_depth: [0, 5]
        init_pad: 15
        fill_holes: true
        use_adaptive_threshold: false
        morphology_downsample_factor: 1
        morphology_refine_edges: false
        morphology_refine_band_voxels: 3


    knee:
      inner:
        endosteal_threshold: 250   # endo_lower in AutocontourKnee
        endosteal_kernelsize: 3    # endo_open_radius
        gaussian_sigma: 2.0        # endo_sigma
        gaussian_truncate: 1.0
        peel: 4                    # endo_min_cort_th
        trabecular_close_radius: 36  # 50 endo_close_radius (final fill of marrow cavity)
        init_pad: 30
        use_adaptive_threshold: false
        morphology_downsample_factor: 3
        morphology_refine_edges: true
        morphology_refine_band_voxels: 3

      outer:
        periosteal_threshold: 150  # peri_s1/s3_lower
        periosteal_kernelsize: 16  # peri_s4_close_radius (final smoothing close)
        periosteal_open_radius: 8  # peri_s4_open_radius
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        expansion_depth: [0, 5]
        init_pad: 15
        fill_holes: true
        use_adaptive_threshold: false  # use fixed threshold like AutocontourKnee
        morphology_downsample_factor: 3
        morphology_refine_edges: true
        morphology_refine_band_voxels: 3

  segmentation:
    method: adaptive # global | adaptive
    enabled: true
    gaussian_sigma: 0.8
    trab_threshold: 320
    cort_threshold: 450
    adaptive_low_threshold: 190
    adaptive_high_threshold: 450
    adaptive_block_size: 13
    min_size_voxels: 64
    keep_largest_component: true

# -----------------------------------------------------------------------------
# Timelapsed registration
# -----------------------------------------------------------------------------
timelapsed_registration:
  debug: false
  transform_type: euler # euler | translation
  metric: correlation # correlation | mattes
  sampling_percentage: 0.1
  interpolator: linear # linear | nearest
  optimizer: adaptive_stochastic_gradient_descent # current supported default
  number_of_iterations: 250
  automatic_parameter_estimation: true
  initializer: geometry # geometry
  number_of_resolutions: 4
  use_masks: true

# -----------------------------------------------------------------------------
# Multistack correction
# -----------------------------------------------------------------------------
multistack_correction:
  enabled: true
  method: boundary_2d # superstack | boundary_2d
  transform_type: euler # euler | translation
  # Mattes is the recommended default for multistack superstack registration.
  metric: mattes # correlation | mattes
  sampling_percentage: 0.5
  interpolator: linear # linear | nearest
  optimizer: adaptive_stochastic_gradient_descent # current supported default
  number_of_iterations: 1000
  automatic_parameter_estimation: true
  initializer: geometry # geometry
  number_of_resolutions: 1
  use_masks: true
  debug: false

# -----------------------------------------------------------------------------
# Transform application
# -----------------------------------------------------------------------------
transform:
  image_interpolator: linear # linear | nearest
  mask_interpolator: nearest # nearest recommended for masks/seg

# -----------------------------------------------------------------------------
# Fusion and optional filling
# -----------------------------------------------------------------------------
fusion:
  save_fused: true
  save_fusedfilled: true
  enable_filling: true

# -----------------------------------------------------------------------------
# Filling
# -----------------------------------------------------------------------------
filling:
  spatial_min_size: 3
  spatial_max_size: 23
  spatial_step: 5
  temporal_n_images: 3
  small_object_min_size_factor: 9
  support_closing_z: 11
  roi_margin_xy: 3
  roi_margin_z_extra: 2

# -----------------------------------------------------------------------------
# Analysis
# -----------------------------------------------------------------------------
analysis:
  space: baseline_common # baseline_common | pairwise_fixed_t0
  method: grayscale_and_binary # grayscale_and_binary | grayscale_delta_only
  compartments:
    - trab
    - cort
    - full
  thresholds:
    - 225
  cluster_sizes:
    - 12
  pair_mode: adjacent # adjacent | baseline | all_pairs
  use_filled_images: false
  gaussian_filter: true
  gaussian_sigma: 1.2 # voxels

  valid_region:
    erosion_voxels: 1

# -----------------------------------------------------------------------------
# Visualization
# -----------------------------------------------------------------------------
visualization:
  enabled: true
  threshold: 225
  cluster_size: 12

  label_map:
    # Output labels in the exported visualization volume.
    resorption: 1
    demineralisation: 2
    quiescent: 3
    formation: 4
    mineralisation: 5
