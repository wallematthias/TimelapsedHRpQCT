name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: multistack-ci
          cache-environment: true
          post-cleanup: all

      - name: Run test suite
        shell: bash -l {0}
        run: |
          micromamba activate multistack-ci
          pytest -q

  conda-package:
    name: Conda Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          create-args: >-
            -c numerics88
            -c conda-forge
            python=3.11
            conda-build
          environment-name: conda-build-env
          cache-environment: true
          post-cleanup: all

      - name: Build conda package
        shell: bash -l {0}
        run: |
          micromamba activate conda-build-env
          conda build conda-recipe --channel numerics88 --channel conda-forge --output-folder conda-dist

      - name: Upload conda package artifact
        uses: actions/upload-artifact@v4
        with:
          name: conda-package
          path: conda-dist/**
