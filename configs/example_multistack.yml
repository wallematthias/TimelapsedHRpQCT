# Example multistack configuration.
#
# This file intentionally only overrides a small subset of defaults so it can
# be used as a starting point for multistack datasets.

discovery:
  session_regex: '(?i)(?P<subject>SAMPLE\d+)_(?P<site>DR|DT|KN)(?:_STACK(?P<stack>\d+))?_(?P<session>T\d+)(?:_(?P<role>.*))?\.aim(?:;\d+)?$'

masks:
  generate: true
  roles: [full, trab, cort]
  generate_segmentation: true

multistack_correction:
  enabled: true

fusion:
  enable_filling: true

analysis:
  use_filled_images: true