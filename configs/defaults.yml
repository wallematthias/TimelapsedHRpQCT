# -----------------------------------------------------------------------------
# TimelapsedHRpQCT default configuration
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Import
# -----------------------------------------------------------------------------
import:
  stack_depth: 168
  on_incomplete_stack: error # error | drop_last | keep_last

  image_role_patterns:
    image: [".AIM"]
    trab: ["TRAB_MASK", "_TRAB"]
    cort: ["CORT_MASK", "_CORT"]
    full: ["FULL_MASK", "_FULL"]
    seg: ["_SEG", "SEG"]

  crop_to_subject_box: true
  crop_threshold_bmd: 450.0
  crop_padding_voxels: 5
  crop_num_largest_components: 1

# -----------------------------------------------------------------------------
# Discovery
# -----------------------------------------------------------------------------
discovery:
  session_regex: '(?i)(?P<subject>SAMPLE\d+)_(?P<site>DR|DT|KN)(?:_STACK(?P<stack>\d+))?_(?P<session>T\d+)(?:_(?P<role>.*))?\.aim$'
  default_site: radius
  site_aliases:
    radius: [DR, RADIUS, RAD]
    tibia: [DT, TIBIA, TIB]
    knee: [KN, KNEE]

  role_aliases:
    cort: ["CORT_MASK", "_CORT", "CORTICAL"]
    trab: ["TRAB_MASK", "_TRAB", "TRABECULAR"]
    full: ["FULL_MASK", "_FULL"]
    seg: ["_SEG", "SEG"]

# -----------------------------------------------------------------------------
# Mask generation on imported stacks
# -----------------------------------------------------------------------------
masks:
  generate: true
  overwrite: false
  # Typical values: [full, trab, cort] or [full]
  roles: [full, trab, cort]
  derive_full_from_cort_trab: true
  generate_segmentation: true
  site_selection:
    default_site: radius
    patterns:
      radius: [radius, rad]
      tibia: [tibia, tib]
      knee: [knee]
  site_defaults:
    radius:
      inner:
        endosteal_threshold: 450
        endosteal_kernelsize: 3
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        peel: 3
        trabecular_close_radius: 15
        init_pad: 30
        use_adaptive_threshold: false
    tibia:
      inner:
        endosteal_threshold: 450
        endosteal_kernelsize: 3
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        peel: 3
        trabecular_close_radius: 25
        init_pad: 30
        use_adaptive_threshold: false
    knee:
      inner:
        endosteal_threshold: 450
        endosteal_kernelsize: 3
        gaussian_sigma: 1.5
        gaussian_truncate: 1.0
        peel: 3
        trabecular_close_radius: 25
        init_pad: 30
        use_adaptive_threshold: false

  outer:
    periosteal_threshold: 320
    periosteal_kernelsize: 5
    periosteal_open_radius: 3
    gaussian_sigma: 1.5
    gaussian_truncate: 1.0
    expansion_depth: [0, 5]
    init_pad: 15
    fill_holes: true
    use_adaptive_threshold: true

  inner:
    site: radius
    endosteal_threshold: 450
    endosteal_kernelsize: 3
    gaussian_sigma: 1.5
    gaussian_truncate: 1.0
    peel: 3
    expansion_depth: [0, 3, 10, 3]
    trabecular_close_radius: null
    init_pad: 30
    use_adaptive_threshold: false

  segmentation:
    method: global # global | adaptive
    enabled: true
    gaussian_sigma: 0.8
    trab_threshold: 320
    cort_threshold: 450
    adaptive_low_threshold: 190
    adaptive_high_threshold: 450
    adaptive_block_size: 13
    min_size_voxels: 64
    keep_largest_component: true

# -----------------------------------------------------------------------------
# Timelapsed registration
# -----------------------------------------------------------------------------
timelapsed_registration:
  debug: true
  strategy: sequential_to_baseline # currently the only supported strategy
  reference_session: baseline
  transform_type: euler # euler | translation
  metric: correlation # correlation | mattes
  sampling_percentage: 0.1
  interpolator: linear # linear | nearest
  optimizer: adaptive_stochastic_gradient_descent # current supported default
  number_of_iterations: 250
  initializer: geometry # geometry
  number_of_resolutions: 4
  use_masks: true

# -----------------------------------------------------------------------------
# Multistack correction
# -----------------------------------------------------------------------------
multistack_correction:
  enabled: true
  method: boundary_2d # superstack | boundary_2d
  transform_type: euler # euler | translation
  # Mattes is the recommended default for multistack superstack registration.
  metric: mattes # correlation | mattes
  sampling_percentage: 0.5
  interpolator: linear # linear | nearest
  optimizer: adaptive_stochastic_gradient_descent # current supported default
  number_of_iterations: 1000
  initializer: geometry # geometry
  number_of_resolutions: 1
  use_masks: true
  debug: true

# -----------------------------------------------------------------------------
# Transform application
# -----------------------------------------------------------------------------
transform:
  image_interpolator: linear # linear | nearest
  mask_interpolator: nearest # nearest recommended for masks/seg

# -----------------------------------------------------------------------------
# Fusion and optional filling
# -----------------------------------------------------------------------------
fusion:
  save_fused: true
  save_fusedfilled: true
  enable_filling: true

# -----------------------------------------------------------------------------
# Filling
# -----------------------------------------------------------------------------
filling:
  spatial_min_size: 3
  spatial_max_size: 23
  spatial_step: 5
  temporal_n_images: 3
  small_object_min_size_factor: 9
  support_closing_z: 11
  roi_margin_xy: 3
  roi_margin_z_extra: 2

# -----------------------------------------------------------------------------
# Analysis
# -----------------------------------------------------------------------------
analysis:
  space: baseline_common # baseline_common | pairwise_fixed_t0
  method: grayscale_and_binary # grayscale_and_binary | grayscale_delta_only
  compartments:
    - trab
    - cort
    - full
  thresholds:
    - 225
  cluster_sizes:
    - 12
  pair_mode: adjacent # adjacent | baseline | all_pairs
  use_filled_images: false
  gaussian_filter: true
  gaussian_sigma: 1.2 # voxels

  valid_region:
    erosion_voxels: 1

# -----------------------------------------------------------------------------
# Visualization
# -----------------------------------------------------------------------------
visualization:
  enabled: true
  threshold: 225
  cluster_size: 12

  label_map:
    # Output labels in the exported visualization volume.
    resorption: 1
    demineralisation: 2
    quiescent: 3
    formation: 4
    mineralisation: 5
