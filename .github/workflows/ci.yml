name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Tests (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run test suite
        run: python -m pytest -q

  pip-install-smoke:
    name: Pip Install Smoke (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15-intel
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Fresh install from built wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl

      - name: Import smoke test
        run: |
          python -c "import timelapsedhrpqct; print('import ok')"

      - name: CLI smoke test
        run: timelapse --help

  linux-manylinux-wheel:
    name: Linux manylinux wheel build check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build manylinux wheels with cibuildwheel
        env:
          # Pure-python package emits a single py3-none-any wheel; build once in
          # manylinux to validate the linux wheel path without duplicate filenames.
          CIBW_BUILD: "cp313-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux_*"
        run: |
          python -m pip install --upgrade pip cibuildwheel
          python -m cibuildwheel --platform linux --output-dir dist

      - name: Upload manylinux wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manylinux-wheels
          path: dist/*.whl

  coverage:
    name: Coverage (ubuntu, py3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies (pip)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"
          python -m pip install pytest-cov

      - name: Run coverage
        run: |
          python -m pytest -q \
            --cov=timelapsedhrpqct \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
