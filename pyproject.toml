[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "timelapsed-hrpqct"
version = "0.1.0"
description = "Longitudinal HR-pQCT timelapse analysis workflow with multistack support"
readme = "README.md"
requires-python = ">=3.10"
authors = [{name = "Matthias Walle"}]
license = "AGPL-3.0-only"
dependencies = [
  "numpy",
  "pandas",
  "PyYAML",
  "scikit-image",
  "scipy",
  "SimpleITK",
  "vtk",
]

[project.optional-dependencies]
test = ["pytest"]

[project.scripts]
timelapse = "timelapsedhrpqct.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
